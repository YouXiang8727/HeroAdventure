name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install libatomic
        run: sudo apt-get update && sudo apt-get install -y libatomic1

      - name: Build with Gradle
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Prepare deployment directory
        run: |
          git config --global user.email "youxiang8727@gmail.com"
          git config --global user.name "YouXiang8727"

          mkdir -p deploy_dist
          # 複製編譯產物
          cp -r composeApp/build/dist/wasmJs/productionExecutable/* deploy_dist/
          # 複製 vercel.json 到部署目錄中，確保 Vercel 能讀取配置
          cp vercel.json deploy_dist/
          # 確認目錄內容
          ls -R deploy_dist/

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./deploy_dist
          vercel-args: '--prod'
          vercel-version: latest
